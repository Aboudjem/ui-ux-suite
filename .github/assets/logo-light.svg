<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <style>
    @keyframes scan {
      0%,100% { transform: translateY(0); opacity: 0.6; }
      50% { transform: translateY(40px); opacity: 1; }
    }
    @keyframes pulse {
      0%,100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
    @keyframes barGrow {
      0%,100% { transform: scaleX(0.7); }
      50% { transform: scaleX(1); }
    }
    @keyframes shimmer {
      0%,100% { opacity: 0.06; }
      50% { opacity: 0.12; }
    }
    .scan-line { animation: scan 3.5s ease-in-out infinite; }
    .bar1 { animation: barGrow 2.5s ease-in-out infinite; transform-origin: left center; }
    .bar2 { animation: barGrow 2.5s ease-in-out infinite 0.3s; transform-origin: left center; }
    .bar3 { animation: barGrow 2.5s ease-in-out infinite 0.6s; transform-origin: left center; }
    .bar4 { animation: barGrow 2.5s ease-in-out infinite 0.9s; transform-origin: left center; }
    .dot1 { animation: pulse 2s ease-in-out infinite; }
    .dot2 { animation: pulse 2s ease-in-out infinite 0.5s; }
    .dot3 { animation: pulse 2s ease-in-out infinite 1s; }
    .bg-shimmer { animation: shimmer 5s ease-in-out infinite; }
  </style>
  <rect x="10" y="20" width="700" height="160" rx="24" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.2"/>
  <rect class="bg-shimmer" x="10" y="20" width="700" height="160" rx="24" fill="#0ea5e9"/>
  <!-- Design audit icon: document with score bars -->
  <g transform="translate(40, 40)">
    <!-- Document shadow -->
    <rect x="4" y="8" width="70" height="90" rx="8" fill="#bae6fd" opacity="0.4"/>
    <!-- Document -->
    <rect x="0" y="0" width="70" height="90" rx="8" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1.5"/>
    <!-- Score bars -->
    <rect class="bar1" x="12" y="16" width="34" height="5" rx="2.5" fill="#0ea5e9"/>
    <rect class="bar2" x="12" y="28" width="28" height="5" rx="2.5" fill="#38bdf8"/>
    <rect class="bar3" x="12" y="40" width="40" height="5" rx="2.5" fill="#0ea5e9"/>
    <rect class="bar4" x="12" y="52" width="22" height="5" rx="2.5" fill="#38bdf8"/>
    <!-- Score dots -->
    <circle class="dot1" cx="54" cy="18" r="3.5" fill="#22c55e"/>
    <circle class="dot2" cx="54" cy="30" r="3.5" fill="#f59e0b"/>
    <circle class="dot3" cx="54" cy="42" r="3.5" fill="#22c55e"/>
    <circle class="dot1" cx="54" cy="54" r="3.5" fill="#ef4444"/>
    <!-- Scan line -->
    <rect class="scan-line" x="6" y="12" width="58" height="2" rx="1" fill="#0ea5e9" opacity="0.5"/>
    <!-- Checkmark badge -->
    <circle cx="62" cy="78" r="10" fill="#0ea5e9"/>
    <path d="M56 78 L60 82 L68 74" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Title -->
  <text x="150" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#0c4a6e" letter-spacing="-1">ui-ux-suite</text>
  <!-- Subtitle -->
  <text x="150" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#0ea5e9" font-weight="500">Design Quality, Measured. Not Guessed.</text>
  <!-- Tagline -->
  <text x="150" y="144" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b">12 dimensions  ·  WCAG + APCA  ·  OKLCH color science  ·  Zero deps</text>
</svg>
