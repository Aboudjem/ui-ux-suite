name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [18, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Validate modules
        run: npm test

      - name: Validate manifest
        run: |
          node -e "
          const m = require('./manifest.json');
          const fs = require('fs');
          if (!m.name) { console.error('Missing name'); process.exit(1); }
          if (!m.agents || !m.agents.length) { console.error('Missing agents'); process.exit(1); }
          if (!m.skills || !m.skills.length) { console.error('Missing skills'); process.exit(1); }
          if (!m.commands || !m.commands.length) { console.error('Missing commands'); process.exit(1); }
          if (!m.mcpServer) { console.error('Missing mcpServer'); process.exit(1); }
          let bad = [];
          [...m.agents, ...m.skills, ...m.commands, m.mcpServer].forEach(p => {
            if (!fs.existsSync(p)) bad.push(p);
          });
          if (bad.length) { console.error('Missing files:', bad); process.exit(1); }
          console.log('Manifest valid:', m.agents.length, 'agents,', m.skills.length, 'skills,', m.commands.length, 'commands, mcpServer OK');
          "

      - name: Validate Claude Code plugin + marketplace manifests
        run: |
          node -e "
          const fs = require('fs');
          const plugin = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json', 'utf8'));
          const pkg = require('./package.json');
          if (!plugin.name) { console.error('.claude-plugin/plugin.json missing name'); process.exit(1); }
          if (plugin.version !== pkg.version) {
            console.error('.claude-plugin/plugin.json version', plugin.version, 'does not match package.json version', pkg.version);
            process.exit(1);
          }
          console.log('Claude Code plugin manifest valid: name=' + plugin.name + ' version=' + plugin.version);

          if (fs.existsSync('.claude-plugin/marketplace.json')) {
            const mp = JSON.parse(fs.readFileSync('.claude-plugin/marketplace.json', 'utf8'));
            if (!mp.name || !Array.isArray(mp.plugins) || mp.plugins.length === 0) {
              console.error('.claude-plugin/marketplace.json invalid: missing name or plugins');
              process.exit(1);
            }
            const self = mp.plugins.find(p => p.name === plugin.name);
            if (self && self.version !== pkg.version) {
              console.error('marketplace.json version for', plugin.name, '(' + self.version + ') does not match package.json (' + pkg.version + ')');
              process.exit(1);
            }
            console.log('Marketplace manifest valid:', mp.name, 'listing', mp.plugins.length, 'plugins');
          }
          "

      - name: Validate slash commands
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          if (!fs.existsSync('commands')) {
            console.log('No commands/ dir, skipping.');
          } else {
            const files = fs.readdirSync('commands').filter(f => f.endsWith('.md'));
            if (files.length === 0) { console.error('commands/ directory is empty'); process.exit(1); }
            const bad = [];
            for (const f of files) {
              const content = fs.readFileSync(path.join('commands', f), 'utf8');
              if (!content.startsWith('---')) bad.push(f + ': missing YAML frontmatter');
              else if (!/description:/m.test(content)) bad.push(f + ': frontmatter missing description');
            }
            if (bad.length) { console.error('Invalid slash commands:', bad); process.exit(1); }
            console.log('Slash commands valid:', files.length, 'files');
          }
          "

      - name: Verify package.json
        run: |
          node -e "
          const p = require('./package.json');
          const required = ['name','version','description','license','repository','engines','files','keywords'];
          const missing = required.filter(k => !p[k]);
          if (missing.length) { console.error('Missing fields:', missing); process.exit(1); }
          console.log('package.json valid');
          "
