name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Validate manifest
        run: |
          node -e "
          const m = require('./manifest.json');
          const fs = require('fs');
          let bad = [];
          const commands = Array.isArray(m.commands) ? m.commands : [];
          [...m.agents, ...m.skills, ...commands, m.mcpServer].forEach(p => {
            if (!fs.existsSync(p)) bad.push(p);
          });
          if (bad.length) { console.error('Missing files:', bad); process.exit(1); }
          console.log('Manifest valid:', m.agents.length, 'agents,', m.skills.length, 'skills,', commands.length, 'commands');
          "

      - name: Validate Claude Code plugin manifest matches package.json
        run: |
          node -e "
          const fs = require('fs');
          const plugin = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json', 'utf8'));
          const pkg = require('./package.json');
          if (plugin.version !== pkg.version) {
            console.error('.claude-plugin/plugin.json version', plugin.version, 'does not match package.json version', pkg.version);
            process.exit(1);
          }
          console.log('Claude Code plugin version matches package.json:', plugin.version);
          "

      - name: Publish to npm with provenance (OIDC)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false

  sync-10x:
    name: Sync 10x marketplace
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Dispatch plugin-released to 10x
        env:
          DISPATCH_TOKEN: ${{ secrets.TEN_X_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "TEN_X_DISPATCH_TOKEN secret not set; skipping 10x sync."
            exit 0
          fi
          curl -sS -X POST \
            -H "Authorization: token $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Aboudjem/10x/dispatches \
            -d '{"event_type":"plugin-released","client_payload":{"plugin":"ui-ux-suite","version":"${{ steps.version.outputs.value }}"}}'
